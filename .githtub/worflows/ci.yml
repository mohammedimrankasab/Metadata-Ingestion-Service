name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Download dependencies
      run: go mod download

    - name: Go fmt
      run: test -z "$(gofmt -l .)"

    - name: Go vet
      run: go vet ./...

    - name: Build
      run: go build ./...

    - name: Test
      run: go test ./...